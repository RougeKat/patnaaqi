name: Fetch AQI Data

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated JSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch AQI data from WAQI + Open-Meteo
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: node .github/scripts/fetch-aqi.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/aqi.json
          # Only commit if there is actually a change
          if git diff --staged --quiet; then
            echo "No changes to aqi.json — skipping commit."
          else
            git commit -m "chore: update aqi.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
