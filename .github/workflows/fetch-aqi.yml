name: Fetch AQI Data

on:
  schedule:
    # Runs hourly at the top of the hour in IST (UTC+5:30)
    - cron: '30 * * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write   # needed to push the updated JSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch AQI data from WAQI + Open-Meteo
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: node .github/scripts/fetch-aqi.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/aqi.json
          # Only commit if there is actually a change
          if git diff --staged --quiet; then
            echo "No changes to aqi.json — skipping commit."
          else
            git commit -m "chore: update aqi.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Sync updated data directly to gh-pages branch
        run: |
          # Checkout gh-pages branch into a separate temporary directory
          git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-dir
          # Copy the fresh aqi.json over the existing one
          mkdir -p gh-pages-dir/data
          cp public/data/aqi.json gh-pages-dir/data/aqi.json
          cd gh-pages-dir
          # Configure bot identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aqi.json
          # Commit and push directly to gh-pages if there's a difference
          if git diff --staged --quiet; then
            echo "No data changes to push to gh-pages."
          else
            git commit -m "chore: sync aqi.json data [skip ci]"
            git push
          fi
